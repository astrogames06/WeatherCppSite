<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <title>raylib web game</title>

    <style>
        body { margin: 0px; }
        canvas.emscripten {
            border: 0px none;
            width: 90vw;
            height: auto;
            border-radius: 25px;
        }
        #canvas-container
        {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
    </style>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    </head>
    <body>
        <div id="canvas-container">
            <canvas class=emscripten id=canvas oncontextmenu=event.preventDefault() tabindex=-1></canvas>
        </div>
        <script>
            var Module = {
                onRuntimeInitialized: function () {
                    console.log("onRuntimeInitialized RUN!");

                    navigator.geolocation.getCurrentPosition(pos => {
                        const lat = pos.coords.latitude;
                        const lon = pos.coords.longitude;
                        console.log(lat);
                        console.log(lon);
                        console.log(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
                        axios.get(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`) // Gets the current city the user is in
                            .then(response => {
                                let city = response.data.address.city;
                                let suburb = response.data.address.suburb;
                                console.log("City:", city);
                                console.log("Suburb:", suburb);

                                Module.set_area(`${city}, ${suburb}`);

                                fetch(`https://wttr.in/${suburb}+${city}?format=j1`) // Gets the cities weather data
                                    .then(res => res.json())
                                    .then(data => { // This is where all the weather data is fed to the C++

                                        // Weather description e.g Sunny, Snow, Rain
                                        let weather_desc = data.current_condition[0].weatherDesc[0].value;
                                        console.log("weather description: ", weather_desc);
                                        Module.set_weather_desc(weather_desc);

                                        // Temperature in celcius
                                        let temperature = data.current_condition[0].temp_C;
                                        console.log("Temperature: ", temperature);
                                        Module.set_temperature(temperature);
                                    })
                                    .catch(error => console.log(error))
                            })
                            .catch(error => {
                                console.error("Error fetching city:", error);
                            });
                    });
                },
                canvas: (function() {
                    var canvas = document.getElementById('canvas');
                    return canvas;
                })()
            };
        </script>
        <script src="index.js"></script>
    </body>
</html>
